<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oluşturulan Vaka - Sesli</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main class="mobile-page session-page voice-session">
      <header class="topbar topbar-tight">
        <button id="backToGeneratorBtn" class="icon-square" type="button" aria-label="Geri dön">
          <span aria-hidden="true">&larr;</span>
        </button>
        <div class="topbar-text">
          <h1>Oluşturulan Vaka</h1>
          <p>
            <span id="caseSpecialty">Oluşturulan</span>
            <span class="dot-sep">&middot;</span>
            <span id="caseDifficulty">Random</span>
          </p>
        </div>
      </header>

      <div class="mode-banner">Sesli Mod Aktif</div>

      <section class="patient-card">
        <div class="patient-avatar">HS</div>
        <div>
          <h2 id="patientLine">Hasta detayları görüşme sırasında paylaşılacak</h2>
          <p id="patientComplaint">Başvuru şikayeti görüşme içinde netleşecek</p>
        </div>
      </section>

      <section class="listening-card">
        <div class="listening-orb">
          <span class="bar b1"></span>
          <span class="bar b2"></span>
          <span class="bar b3"></span>
          <span class="bar b4"></span>
        </div>
        <p id="listeningPill" class="listening-pill">Mikrofona basılı tut</p>
      </section>

      <section class="transcript-card">
        <div class="section-head">
          <h3>Canlı Görüşme Notları</h3>
          <p id="voiceMessageCount">0 mesaj</p>
        </div>
        <ul id="voiceTranscriptList" class="voice-transcript-list" role="log" aria-live="polite" aria-relevant="additions">
          <li id="voiceTypingIndicator" class="voice-line ai typing-indicator-line" hidden aria-live="polite">
            <span class="voice-line-icon">KOÇ</span>
            <div class="voice-line-body">
              <p class="speaker">Vaka Koçu</p>
              <p class="message typing-bubble" aria-label="Koç yanıt hazırlıyor">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
              </p>
            </div>
          </li>
        </ul>
      </section>

      <section class="aux-actions">
        <button type="button" class="ghost-action">Not Al</button>
        <button type="button" class="ghost-action">İpucu Al</button>
      </section>

      <section class="voice-controls">
        <button id="pauseBtn" type="button" class="icon-control secondary">DURDUR</button>
        <button id="micBtn" type="button" class="icon-control primary">BASILI TUT</button>
        <button id="endVoiceCaseBtn" type="button" class="icon-control danger">VAKAYI BİTİR</button>
      </section>

      <p id="voiceStatusLine" class="status-line">Sesli oturum hazırlanıyor...</p>
    </main>

    <script type="module" src="/auth-guard.js"></script>
    <script type="module" src="/voice-session.js"></script>
  </body>
</html>
