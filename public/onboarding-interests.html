<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding - İlgi Alanları</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main class="mobile-page onboarding-page">
      <header class="onboarding-head">
        <button id="interestsBackBtn" class="icon-square" type="button" aria-label="Geri dön">
          <span aria-hidden="true">&larr;</span>
        </button>
      </header>

      <div class="onboarding-progress">
        <span style="width: 75%"></span>
      </div>
      <p class="onboarding-step-text">Adım 3 / 4</p>

      <section class="onboarding-title-block">
        <h1>Tıbbi ilgi alanlarını seç</h1>
        <p>En az 3 alan seç. Önerilen vakaları bu seçime göre önceliklendireceğiz.</p>
      </section>

      <section class="selection-summary" id="interestSummary">0 alan seçili</section>

      <section id="interestGrid" class="interest-grid"></section>

      <div class="dual-actions">
        <button id="selectAllInterestsBtn" type="button" class="outline-btn">Tümünü seç</button>
        <button id="clearInterestsBtn" type="button" class="outline-btn">Temizle</button>
      </div>

      <div class="onboarding-info-box info-warn">
        Merak etme, seçmediğin alanlardaki vakalara da dilediğin zaman ulaşabilirsin.
      </div>

      <p id="interestsStatus" class="auth-status" hidden></p>

      <button id="interestsContinueBtn" type="button" class="primary-cta onboarding-cta">
        Devam et →
      </button>
    </main>

    <script type="module" src="/onboarding-guard.js"></script>
    <script type="module" src="/onboarding-interests.js"></script>
  </body>
</html>
