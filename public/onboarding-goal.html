<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onboarding - Rol Seçimi</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main class="mobile-page onboarding-page">
      <header class="onboarding-head">
        <button id="goalBackBtn" class="icon-square" type="button" aria-label="Geri dön">
          <span aria-hidden="true">&larr;</span>
        </button>
      </header>

      <div class="onboarding-progress">
        <span style="width: 50%"></span>
      </div>
      <p class="onboarding-step-text">Adım 2 / 4</p>

      <section class="onboarding-title-block">
        <h1>Mevcut rolünü seç</h1>
        <p>Öğrenme deneyimini eğitim seviyene göre kişiselleştirelim.</p>
      </section>

      <section id="roleCards" class="role-card-list"></section>

      <div class="onboarding-info-box info-blue">
        Bu seçimi daha sonra profil ayarlarından güncelleyebilirsin.
      </div>

      <p id="goalStatus" class="auth-status" hidden></p>

      <button id="goalContinueBtn" type="button" class="primary-cta onboarding-cta">Devam et →</button>
    </main>

    <script type="module" src="/onboarding-guard.js"></script>
    <script type="module" src="/onboarding-goal.js"></script>
  </body>
</html>
