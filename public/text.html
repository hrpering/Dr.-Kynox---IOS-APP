<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oluşturulan Vaka - Yazı</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main class="mobile-page session-page text-session">
      <header class="topbar topbar-tight">
        <button id="backToGeneratorBtn" class="icon-square" type="button" aria-label="Geri dön">
          <span aria-hidden="true">&larr;</span>
        </button>
        <div class="topbar-text">
          <h1>Oluşturulan Vaka</h1>
          <p>
            <span id="textCaseSpecialty">Oluşturulan</span>
            <span class="dot-sep">&middot;</span>
            <span id="textCaseDifficulty">Random</span>
          </p>
        </div>
      </header>

      <div class="session-meta-row">
        <span id="sessionClock">12:34</span>
        <span id="textMessageCount">0 mesaj</span>
        <span class="mode-chip">Yazı Modu</span>
      </div>

      <section class="chat-card">
        <ul id="textTranscriptList" class="chat-list" role="log" aria-live="polite" aria-relevant="additions">
          <li id="textTypingIndicator" class="chat-message ai typing-indicator" hidden aria-live="polite">
            <div class="bubble typing-bubble" aria-label="Vaka koçu yanıt hazırlıyor">
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
              <span class="typing-dot"></span>
            </div>
          </li>
        </ul>
      </section>

      <section class="aux-actions">
        <button type="button" class="ghost-action">Not Al</button>
        <button type="button" class="ghost-action">İpucu Al</button>
      </section>

      <section class="composer-wrap">
        <div class="composer-row">
          <input id="textInput" type="text" placeholder="Yanıtını veya sorunu yaz..." />
          <button id="sendTextBtn" type="button" class="send-btn">GÖNDER</button>
        </div>
        <button id="endTextCaseBtn" type="button" class="end-case-btn">Vakayı Bitir</button>
      </section>

      <p id="textStatusLine" class="status-line">Yazı oturumu hazırlanıyor...</p>
    </main>

    <script type="module" src="/auth-guard.js"></script>
    <script type="module" src="/text-session.js"></script>
  </body>
</html>
