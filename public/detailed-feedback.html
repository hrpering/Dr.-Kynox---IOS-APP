<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detaylı Geri Bildirim</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main class="mobile-page detailed-page">
      <header class="topbar results-topbar">
        <button id="backToResultsBtn" class="icon-square" type="button" aria-label="Sonuçlara dön">
          <span aria-hidden="true">&larr;</span>
        </button>
        <h1>Detaylı Geri Bildirim</h1>
      </header>

      <section class="case-meta-pill">
        <p id="caseMetaTitle">Oluşturulan Klinik Vaka - Genel Tıp</p>
        <span id="caseMetaTime">Bugün</span>
      </section>

      <section class="feedback-overview-card">
        <div class="feedback-overview-head">
          <div class="feedback-overview-icon">PF</div>
          <div>
            <h2>Genel Performans</h2>
            <p id="overallSubtitle">Klinik performans özeti</p>
          </div>
        </div>

        <div class="score-label-row">
          <div class="score-label-score">
            <span id="feedbackOverallScore">0</span>
            <small>/100</small>
          </div>
          <div id="feedbackLabelBadge" class="feedback-label-badge">İyi</div>
        </div>

        <div class="diagnosis-summary-block">
          <p><strong>Doğru tanı:</strong> <span id="feedbackTrueDiagnosis">-</span></p>
          <p><strong>Koyduğun tanı:</strong> <span id="feedbackUserDiagnosis">-</span></p>
        </div>

        <h3>Genel Değerlendirme</h3>
        <p id="generalAssessmentText"></p>
      </section>

      <h3 class="detailed-section-title">Detaylı Değerlendirme (10 Alan)</h3>
      <div id="dimensionAccordion" class="dimension-accordion"></div>

      <footer class="detailed-footer">
        <button id="exportBtn" type="button" class="footer-ghost-btn">Raporu Dışa Aktar</button>
        <button id="continueFromDetailBtn" type="button" class="footer-primary-btn">
          Öğrenmeye Devam Et →
        </button>
      </footer>
    </main>

    <script type="module" src="/auth-guard.js"></script>
    <script type="module" src="/detailed-feedback.js"></script>
  </body>
</html>
