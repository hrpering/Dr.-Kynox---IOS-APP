<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş Yap - MedCase</title>
    <link rel="prefetch" href="/index.html" />
    <link rel="prefetch" href="/onboarding-profile.html" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main class="mobile-page auth-page form-auth-page">
      <section class="auth-brand-block">
        <div class="brand-logo">MC</div>
        <h1>MedCase AI</h1>
        <p>Hesabına giriş yap, kaldığın yerden vakalara devam et.</p>
      </section>

      <form id="loginForm" class="auth-form" novalidate>
        <label for="loginEmail">E-posta adresi</label>
        <div class="auth-input-wrap">
          <input id="loginEmail" type="email" placeholder="örnek@eposta.com" autocomplete="email" required />
        </div>

        <label for="loginPassword">Şifre</label>
        <div class="auth-input-wrap auth-password-wrap">
          <input
            id="loginPassword"
            type="password"
            placeholder="Şifren"
            autocomplete="current-password"
            required
          />
          <button id="toggleLoginPassword" type="button" class="password-toggle">Göster</button>
        </div>

        <button id="forgotPasswordBtn" type="button" class="auth-link-btn">Şifremi unuttum</button>

        <button id="loginSubmitBtn" type="submit" class="primary-cta auth-primary">Giriş yap</button>
      </form>

      <div class="social-sep"><span>veya</span></div>

      <section class="social-grid">
        <button id="googleLoginBtn" type="button" class="social-btn">Google</button>
        <button id="appleLoginBtn" type="button" class="social-btn">Apple</button>
      </section>

      <p class="auth-switch-text">
        Hesabın yok mu?
        <a href="/signup.html">Hesap oluştur</a>
      </p>

      <p id="loginStatus" class="auth-status" hidden></p>
    </main>

    <script type="module" src="/login.js"></script>
  </body>
</html>
