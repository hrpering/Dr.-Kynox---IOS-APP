<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vaka Geçmişi</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="app-shell">
    <main id="historyMain" class="mobile-page history-page" aria-busy="true">
      <header class="topbar results-topbar">
        <button id="backToDashboardBtn" class="icon-square" type="button" aria-label="Geri dön">
          <span aria-hidden="true">&larr;</span>
        </button>
        <h1>Vaka Geçmişi</h1>
      </header>

      <section class="history-search-wrap">
        <input id="historySearchInput" type="search" placeholder="Vaka adı, bölüm veya zorluk ara..." />
      </section>

      <section id="historySummaryCard" class="history-summary-card">
        <p id="historySummaryText">Kayıtlar yükleniyor...</p>
      </section>

      <section id="historyLoadingSkeleton" class="history-skeleton" aria-live="polite" aria-label="Vaka geçmişi yükleniyor">
        <div class="loading-spinner" aria-hidden="true"></div>
        <div class="history-skeleton-item"></div>
        <div class="history-skeleton-item"></div>
        <div class="history-skeleton-item"></div>
      </section>

      <section id="historyList" class="history-list"></section>
    </main>

    <script type="module" src="/auth-guard.js"></script>
    <script type="module" src="/case-history.js"></script>
  </body>
</html>
